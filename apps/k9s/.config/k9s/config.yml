k9s:
  refreshRate: 2
  maxConnRetry: 5
  enableMouse: false
  headless: false
  logoless: false
  crumbsless: false
  readOnly: false
  noExitOnCtrlC: false
  noIcons: false
  skipLatestRevCheck: false
  logger:
    tail: 100
    buffer: 5000
    sinceSeconds: 60
    fullScreenLogs: false
    textWrap: false
    showTime: false
  currentContext: cluster-superzop
  currentCluster: cluster-superzop
  clusters:
    cluster-superzop:
      namespace:
        active: kl-init-operators
        lockFavorites: false
        favorites:
        - helm-cert-manager
        - kl-provider-superzop
        - kl-edge-superzop-mumbai-1
        - all
        - kl-init-operators
        - superzop
        - helm-gitlab-runner
        - kl-core
        - default
      view:
        active: pods
      featureGates:
        nodeShell: false
      shellPod:
        image: busybox:1.35.0
        command: []
        args: []
        namespace: default
        limits:
          cpu: 100m
          memory: 100Mi
        labels: {}
      portForwardAddress: localhost
  thresholds:
    cpu:
      critical: 90
      warn: 70
    memory:
      critical: 90
      warn: 70
  screenDumpDir: /tmp/k9s-screens-nxtcoder17
