# symbol_map U+003D "ComicCodeLigatures-Bold"  # =
# symbol_map U+0066 "ComicCodeLigatures-Bold"  # f

symbol_map U+003A "Source Code Pro Medium"  # :
symbol_map U+003B "Source Code Pro Medium"  # ;
