# vim: set ft=conf:

### font-group: Github Monaspace
font_family      Monaspace Radon Var Light
italic_font      Monaspace Radon Var Light Italic
bold_font        Monaspace Radon Var Bold
bold_italic_font Monaspace Radon Var Bold Italic

# read more @ https://sw.kovidgoyal.net/kitty/conf/#opt-kitty.font_features
font_features MonaspaceRadonVar-Light       +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig +lig
font_features MonaspaceRadonVar-LightItalic +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig 
font_features MonaspaceRadonVar-Bold        +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig 
font_features MonaspaceRadonVar-BoldItalic  +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig 

modify_font cell_height +6px
modify_font baseline -2
adjust_line_height 4
