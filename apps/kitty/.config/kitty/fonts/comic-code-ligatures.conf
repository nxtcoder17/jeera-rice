# vim: set ft=conf:
font_family      ComicCodeLigatures Nerd Font Medium
bold_font        ComicCodeLigatures Nerd Font Bold
# italic_font      ComicCodeLigatures Nerd Font Italic
italic_font      Monaspace Radon Var Light Italic
# bold_italic_font ComicCodeLigatures Nerd Font Bold Italic
bold_italic_font Monaspace Radon Var Bold Italic
font_size 10.0

font_features MonaspaceRadonVar-LightItalic +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig +calt
font_features MonaspaceRadonVar-BoldItalic  +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08 +dlig +calt
