# vim:ft=kitty

## name:     Catppuccin Kitty Latte
## author:   Catppuccin Org
## license:  MIT
## upstream: https://github.com/catppuccin/kitty/blob/main/themes/latte.conf
## blurb:    Soothing pastel theme for the high-spirited!

# The basic colors
foreground              #2f3447
background              #fafbfc
selection_foreground    #fafbfc
selection_background    #a35b51

# Cursor colors
cursor                  #a35b51
cursor_text_color       #fafbfc

# URL underline color when hovering with mouse
url_color               #a35b51

# Kitty window border colors
active_border_color     #3f4457

inactive_border_color   #cdd1d6
bell_border_color       #5b4415

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #fafbfc
active_tab_background   #7853a8
inactive_tab_foreground #3f4457
inactive_tab_background #b8bcc2
tab_bar_background      #cdd1d6

# Colors for marks (marked text in the terminal)
mark1_foreground #fafbfc
mark1_background #464a7c
mark2_foreground #fafbfc
mark2_background #7853a8
mark3_foreground #fafbfc
mark3_background #3f6385

# The 16 terminal colors

# black
color0 #3f4457
color8 #4f5467

# red
color1 #c23848
color9 #c23848

# green
color2  #143b0f
color10 #143b0f

# yellow
color3  #5b4415
color11 #5b4415

# blue
color4  #2f5ca3
color12 #2f5ca3

# magenta
color5  #b85896
color13 #b85896

# cyan
color6  #2d7168
color14 #2d7168

# white
color7  #b8bcc2
color15 #cdd1d6

background_tint  0.40
background_image ./backgrounds/light.png
background_image_layout mirror-tiled

