# map ctrl+shift+s launch --type=tab --allow-remote-control ~/.config/kitty/scripts/kitty-session-save.sh
# map ctrl+shift+s save_as_session --use-foreground-process --relocatable
# map ctrl+a>s launch --type=tab --allow-remote-control ~/.config/kitty/scripts/kitty-session-select.sh
map f1 set_window_title
map f2 save_as_session --use-foreground-process --relocatable
