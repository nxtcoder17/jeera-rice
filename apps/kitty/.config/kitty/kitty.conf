# vim: set ft=kitty:

### font-group: operator mono lig
# font_family      Operator Mono Lig Medium
# bold_font        Operator Mono Bold Nerd Font Complete
# italic_font      Operator Mono Lig Medium Italic
# bold_italic_font Operator Mono Bold Italic Nerd Font Complete

### font-group: Comic Code Ligatures
# font_family      ComicCodeLigatures-Medium
# bold_font        ComicCodeLigatures-Bold
# italic_font      ComicCodeLigatures-MedIta
# bold_italic_font ComicCodeLigatures-BoldItalic

font_family      Comic Code Ligatures Medium Nerd Font Plus Font Awesome Plus Font Awesome Extension Plus Octicons Plus Power Symbols Plus Pomicons Plus Font Logos Plus Weather Icons
bold_font        Comic Code Ligatures Bold Nerd Font Plus Font Awesome Plus Font Awesome Extension Plus Octicons Plus Power Symbols Plus Pomicons Plus Font Logos Plus Weather Icons
italic_font      Comic Code Ligatures Med Ita Nerd Font Plus Font Awesome Plus Font Awesome Extension Plus Octicons Plus Power Symbols Plus Pomicons Plus Font Logos Plus Weather Icons
bold_italic_font Comic Code Ligatures BoldItalic Nerd Font Plus Font Awesome Plus Font Awesome Extension Plus Octicons Plus Power Symbols Plus Pomicons Plus Font Logos Plus Weather Icons

# italic_font      Maple Mono NF Italic
# bold_italic_font Maple Mono NF Bold Italic

### font-group: Recursive Mono Casual
# font_family      RecursiveMonoCslSt-Regular
# bold_font        RecursiveMonoCslSt-Bold
# italic_font      RecursiveMonoLnrSt-Italic
# bold_italic_font RecursiveMonoLnrSt-BdItalic

font_size 11

adjust_line_height  4
# adjust_column_width 1

disable_ligatures never

# Cursor Customization
# cursor #cccccc

shell fish

# TERM env
term xterm-256color
# term xterm-kitty

background_opacity 0.99
# background_image "/home/nxtcoder17/me/jeera-rice/wallpapers/gray-patterns-6K.jpg"


# stops asking for confirmation on close
confirm_os_window_close 0

enable_audio_bell no

# tokyo night is the beauty, kanagawa is sexy
#include themes/catppuccin-mocha.conf
include themes/tokyo-night-moon.conf

# kitty_mod alt
# map kitty_mod+t new_tab_with_cwd

map ctrl+shift+w discard_event
