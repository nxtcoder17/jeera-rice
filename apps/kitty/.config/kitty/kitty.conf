# vim: set ft=conf:

#linux_display_server wayland

# include ./fonts/monaspace-radon.conf
# include ./fonts/comic-code-ligatures.conf
# include ./fonts/operator-mono.conf
# include ./fonts/monolisa.conf
# include ./fonts/agave.conf
# include ./fonts/iosevka.conf

# include ./fonts/serious-shanns.conf
# include ./fonts/mononoki.conf
# include ./fonts/recursive.conf
# include ./fonts/monaspace-krypton.conf
include ./fonts/kode-mono.conf
include ./fonts/nerd-fonts-symbol-map.conf

text_composition_strategy legacy
hide_window_decorations yes

# cursor_trail 50
# cursor_trail_decay 0.1 0.4

# include ./fonts/comic-shanns-mono.conf

disable_ligatures never

# TERM env
# term xterm-255color
# term xterm-kitty

background_opacity 1
window_margin_width 1
window_border_width 1.5pt
adjust_line_height 1

window_padding_width 1

# INFO: background image must be in PNG format

# [source](https://sw.kovidgoyal.net/kitty/conf/#opt-kitty.background_image_layout)
# background_image_layout tiled
# background_image_layout mirror-tiled

# stops asking for confirmation on close
confirm_os_window_close 0

enable_audio_bell no

# INFO: DO NOT use quotes to wrap theme name, kitty will just not work
include ~/.colorscheme.d/kitty/theme.conf

shell_integration no-sudo

cursor_shape block

map ctrl+shift+w no_op

# [source]https://www.reddit.com/r/neovim/comments/mbj8m5/how_to_setup_ctrlshiftkey_mappings_in_neovim_and/?utm_source=share&utm_medium=web3x&utm_name=web3xcss&utm_term=1&utm_content=share_button
# [Also check](https://en.wikipedia.org/wiki/List_of_Unicode_characters#Latin_script)
map ctrl+shift+j send_text all \x1b[74;5u
map ctrl+shift+k send_text all \x1b[75;5u

# maps `cmd + NUM` to send `alt + NUM`
map cmd+1 send_text all \x1b1
map cmd+2 send_text all \x1b2
map cmd+3 send_text all \x1b3
map cmd+4 send_text all \x1b4
map cmd+5 send_text all \x1b5
map cmd+6 send_text all \x1b6
map cmd+7 send_text all \x1b7
map cmd+8 send_text all \x1b8
map cmd+9 send_text all \x1b9
map cmd+0 send_text all \x1b0

# maps `cmd + shift + NUM` to send `alt + shift + NUM`
map cmd+shift+1 send_text all \x1b!
map cmd+shift+2 send_text all \x1b@
map cmd+shift+3 send_text all \x1b#
map cmd+shift+4 send_text all \x1b$
map cmd+shift+5 send_text all \x1b%
map cmd+shift+6 send_text all \x1b^
map cmd+shift+7 send_text all \x1b&
map cmd+shift+8 send_text all \x1b*
map cmd+shift+9 send_text all \x1b(
map cmd+shift+0 send_text all \x1b)

tab_bar_edge top

# clear_all_shortcuts yes

# kitty_mod alt

map alt+shift+h move_window left
map alt+shift+j move_window bottom
map alt+shift+k move_window top
map alt+shift+l move_window right

map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10
map alt+n next_tab
map alt+p prev_tab
map alt+tab toggle_tab all

map ctrl+a>c new_tab_with_cwd
map ctrl+a>, set_tab_title

enabled_layouts splits:split_axis=horizontal,stack

map ctrl+a>- launch --cwd=current --location=hsplit
map ctrl+a>\ launch --cwd=current --location=vsplit
map ctrl+a>q close_window


map ctrl+a>r start_resizing_window

map ctrl+shift+h resize_window narrower
map ctrl+shift+l resize_window wider
map ctrl+shift+k resize_window taller 
map ctrl+shift+j resize_window shorter
# reset all windows in the tab to default sizes
# map ctrl+home resize_window reset

map ctrl+alt+t goto_layout tall
map ctrl+a>z combine : toggle_layout stack : scroll_prompt_to_bottom

map ctrl+alt+s launch --allow-remote-control
  \ kitty +kitten broadcast
  \ --match-tab state:focused
  \ --end-session esc

# scrollback_pager nvim -
scrollback_pager nvim - -c "set nonumber nolist showtabline=0 foldcolumn=0 laststatus=0" -c "silent w! /tmp/kitty_scrollback_buffer | nnoremap q <Cmd>:qall<CR> | bd! | term head -c -1 /tmp/kitty_scrollback_buffer"

map ctrl+a>i show_scrollback

# kitty Sessions
tab_bar_filter session:~ or session:^$
# tab_title_template "{(session_name or tab.active_wd.rsplit('/', 1)[-1]) + ' #' if layout_name == 'stack' else '  '}"
# tab_title_template "{(tab.title or session_name or tab.active_wd.rsplit('/', 1)[-1])}"
active_tab_title_template "{'[' + session_name + '] ' + (title or tab.active_wd).rsplit('/', 1)[-1]}"
allow_remote_control yes

# Reference on how to send_text
# map ctrl+shift+s combine : launch --allow-remote-control --cwd=current --location=vsplit --title "session" :  send_text normal kitty-session-save.sh
map ctrl+shift+s launch --type=background --allow-remote-control kitty-session-save.sh
map ctrl+a>s launch --type=background --allow-remote-control kitty-session-select.sh
# map ctrl+shift+s save_as_session --use-foreground-process --relocatable ~/.local/share/kitty/sessions/
map f1 set_window_title
