<?xml version="1.0"?>
<!-- run `fc-cache -f` after making changes to this file -->
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- source: https://jichu4n.com/posts/how-to-set-default-fonts-and-font-aliases-on-linux/ -->
  <alias>
    <family>serif</family>
    <!-- <prefer><family>ComicCodeLigatures Nerd Font</family></prefer> -->
    <prefer><family>Serious Shanns</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <!-- <prefer><family>ComicCodeLigatures Nerd Font</family></prefer> -->
    <prefer><family>Serious Shanns</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <!-- <prefer><family>ComicCodeLigatures Nerd Font</family></prefer> -->
    <prefer><family>Serious Shanns</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <!-- <prefer><family>ComicCodeLigatures Nerd Font</family></prefer> -->
    <prefer><family>Serious Shanns</family></prefer>
  </alias>
</fontconfig>
