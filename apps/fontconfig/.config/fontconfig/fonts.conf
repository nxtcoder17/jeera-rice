<?xml version="1.0"?>
<!-- run `fc-cache -f` after making changes to this file -->
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- source: https://jichu4n.com/posts/how-to-set-default-fonts-and-font-aliases-on-linux/ -->
  <alias>
    <family>serif</family>
    <prefer><family>ComicCodeLigatures Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer><family>ComicCodeLigatures Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>sans</family>
    <prefer><family>ComicCodeLigatures Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>ComicCodeLigatures Nerd Font</family></prefer>
  </alias>

  <!-- aliasing some common default fonts, with custom ones, from chrome-os -->
  <match>
    <test name="family"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Arimo</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Arimo</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Verdana</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Arimo</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Tahoma</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Arimo</string>
    </edit>
  </match>
  <match>
    <!-- Insert joke here -->
    <test name="family"><string>Comic Sans MS</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Arimo</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Tinos</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Times</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Tinos</string>
    </edit>
  </match>
  <match>
    <test name="family"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Cousine</string>
    </edit>
  </match>


  <match target="scan">
    <test name="family">
        <string>OperatorMono Nerd Font</string>
    </test>
    <edit name="spacing">
        <int>100</int>
    </edit>
  </match>

  <match target="scan">
    <test name="family" compare="contains">
        <string>Monaspace</string>
    </test>
    <edit name="spacing">
        <const>dual</const>
    </edit>
  </match>
</fontconfig>
