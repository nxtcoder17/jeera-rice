# vim: set ft=hyprlang:

# This is an example Hyprland config file.
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#
# See https://wiki.hyprland.org/Configuring/Monitors/

#monitor=HDMI-A-1,preferred,auto,1.5

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox
exec = qs -c noctalia-shell 
# exec = qs -c noctalia-shell ipc call bar toggle
exec-once = swaync & hyprpaper & hypridle
exec-once = swaybg -i ~/me/jeera-rice/wallpapers/light-and-dark/black-and-white-river.jpeg
# exec-once = kanata -c ~/.config/kanata/config.kbd
# exec-once = bash ~/me/jeera-rice/bin/toggle-grayscale.sh

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
# $menu = rofi -show combi -combi-modes "window,run,drun" -matching fuzzy -sort-method fzf --show-icons

# Some default env vars.
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = MESA_LOADER_DRIVER_OVERRIDE, kms_swrast
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24

cursor {
    no_hardware_cursors = true
}

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    # kb_variant =
    # kb_model =
    # kb_options =
    # kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
        disable_while_typing = 1
    }

    repeat_delay = 180
    repeat_rate = 40

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 3
    gaps_out = 3
    border_size = 3
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(454b4dee)
    col.inactive_border = rgba(16566b00)

    layout = dwindle
    # layout = master

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10

    blur {
        enabled = true
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }

    # drop_shadow = true
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = borderangle, 1, 3, default
    animation = fade, 1, 4, default
    # animation = workspaces, 1, 2, default
    animation = workspaces, 1, 3, myBezier
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    #pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
    default_split_ratio = 1.25
    force_split = 2
    # no_gaps_when_only=false
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    mfact = 0.65
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    # name = epic-mouse-v1
    # sensitivity = -0.5
    name = *
    enabled = true
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
windowrule {
  name = "Picture-in-Picture"
  match:title = ^(Picture-in-Picture)$
  float = on
}

#windowrule = opacity 0.95 0.9, ^(kitty)$

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrulev2 = suppressevent maximize, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER
$altMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = SUPER_SHIFT, q, killactive,
$bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, f, togglefloating,
# bind = $mainMod, d, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind=SUPER,TAB,workspace,previous

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# INFO: warpd does not work with wayland
#bind = $altMod, x, exec,warpd --hint
#bind = $altMod SHIFT, x, exec, warpd --history

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $altMod, mouse:272, movewindow
bindm = $altMod, mouse:273, resizewindow

# binds = Control_L&ALT,Period, exec, hyprctl keyword monitor "eDP-2,disable"
# binds = Control_L&ALT,Period, exec, hyprctl keyword monitor "eDP-2,disable"

# Show bar when SUPER is pressed and hide it when it is released

# bindit = SUPER, Super_L, exec, qs -c noctalia-shell ipc call bar toggle
# binditr = SUPER, Super_L, exec, qs -c noctalia-shell ipc call bar toggle


binde = ALT SHIFT, Left, resizeactive, -10 0
binde = ALT SHIFT, Right, resizeactive, 10 0
binde = ALT SHIFT, Down, resizeactive, 0 10
binde = ALT SHIFT, Up, resizeactive, 0 -10

binde = WIN SHIFT, Left, moveactive, -10 0
binde = WIN SHIFT, Right, moveactive, 10 0
binde = WIN SHIFT, Down, moveactive, 0 10
binde = WIN SHIFT, Up, moveactive, 0 -10

windowrule {
  name = "nxthelper"
  match:title = (nxthelper)
  float = on
  size = 50% 50%
}

windowrule {
  name = "floating"
  size = 60% 20%
  float = on
  tile = off
  match:title = (.*floating$)
}

windowrule {
  name = "nxtmenu"
  size = 800 400
  float = on
  center = on
  match:class = nxtmenu
  animation = slide right
  rounding = 10
  no_blur = off
}

windowrule {
  name = "mouseless"
  size = 100% 100%
  float = on
  center = on
  match:title = mouseless
}

windowrule {
  name = "bar"
  match:title = (bar$)
  size = 100% 2%
}

# nxt menu
$menu = kitty --title nxtmenu --class nxtmenu ~/.local/bin/nxtmenu.sh
# $menu = kitty --title nxtmenu --class nxtmenu bash -c "cat $HOME/.config/fzf/themes/light.bash; echo \nNOW\n echo $FZF_DEFAULT_OPTS && tail -f /dev/null"
bind = $mainMod, d, exec, $menu


# # Noctalia Shell overlay behavior
# layerrule = blur, noctalia
# layerrule = ignorezero, noctalia
# layerrule = noanim, noctalia
# layerrule = xray, noctalia


# Example volume button that allows press and hold, volume limited to 151%
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 6%+
bind = $altMod, EQUAL, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

# Example volume button that will activate even while an input inhibitor is active
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = $altMod, MINUS, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-

## screenshot
bind =, Print, exec, sh -c 'REGION=$(slurp) || exit; grim -g "$REGION" - | wl-copy &&  wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot of the region taken" -t 1000'
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot of the whole screen taken" -t 1000
bind = SHIFT ALT, 4, exec, screenshot.sh

